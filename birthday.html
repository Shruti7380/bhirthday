<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:linear-gradient(135deg,#ffe6f2,#ffd9ec,#fff0f8);
overflow-x:hidden;
padding:30px;
display:block;
min-height:100vh;
}

.title{
text-align:center;
font-size:50px;
color:#ff2d6f;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:20px;
color:#666;
margin-bottom:40px;
}

#giftBox{
font-size:120px;
text-align:center;
cursor:pointer;
animation:bounce 2s infinite;
}

#giftText{
text-align:center;
font-size:22px;
color:#ff4f87;
font-weight:bold;
margin-top:10px;
margin-bottom:40px;
}

#letter{
display:none;
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
margin-bottom:50px;
}

#typingText{
font-size:20px;
line-height:34px;
color:#444;
white-space:pre-line;
}

.gallery{
margin-top:50px;
}

.gallery h2{
text-align:center;
color:#ff2d6f;
margin-bottom:25px;
}

.photos{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.photos img{
width:220px;
height:260px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
transition:.4s;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.photos img:hover{
transform:scale(1.08);
}

.popup{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:999;
}

.popup img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

.footer{
text-align:center;
margin:60px 0 20px;
font-size:22px;
font-weight:bold;
color:#ff2d6f;
}

</style>

</head>
<canvas id="confetti"></canvas>
<body>

<h1 class="title">🎉 Happy Birthday Bestie 🎉</h1>

<p class="subtitle">
Today is your special day ❤️
</p>

<div id="giftBox" onclick="openGift()">
🎁
</div>

<p id="giftText">
Click the Gift 🎀
</p>

<div id="letter">

<h2 style="text-align:center;color:#ff2d6f;">
💌 A Letter For You
</h2>

<p id="typingText"></p>

<div class="gallery">

<h2>📸 Our Beautiful Memories</h2>

<div class="photos">

<img src="images/photo1.jpg" onclick="showImage(this.src)">

<img src="images/photo2.jpg" onclick="showImage(this.src)">

<img src="images/photo3.jpg" onclick="showImage(this.src)">

<img src="images/photo4.jpg" onclick="showImage(this.src)">

</div>

</div>
<div class="cakeSection">

<h2>🎂 Make a Birthday Wish 🎂</h2>

<div class="cake">
🎂
</div>

<p>Blow the candles and make your wish! ✨</p>

</div>
<div class="footer">

❤️ Made Especially For My Bestie ❤️

</div>
<div class="fireworks">
✨ 🎆 ✨ 🎇 ✨ 🎆 ✨
</div>

</div>

<div class="popup" id="popup" onclick="closePopup()">

<img id="popupImg">

</div>

<script src="script.js"></script>

</body>

</html>
